title = "redmank gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Generated warehouse identifier fields, not credentials."
regexTarget = "match"
regexes = [
  '''(?i)(person_key|person_or_name_key|on_or_name_key|official_program_key|trend_key|trend_acceptance_key|trend_rollup_key|matched_current_person_key|matched_current_person_keys|observation_key)("{1,2})?\s*[:=]\s*("{1,2})?[^"\n]+("{1,2})?''',
]
